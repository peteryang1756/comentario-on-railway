postgres:
  host: $POSTGRES_HOST
  port: $POSTGRES_PORT
  database: $POSTGRES_DATABASE
  username: $POSTGRES_USERNAME
  password: $POSTGRES_PASSWORD
  sslMode: require
  baseUrl: https://comentario-on-railway-1.onrender.com

idp:
  oidc:
    - id: $OIDC_ID
      name: $OIDC_NAME
      url: $OIDC_URL
      scopes:
        - $OIDC_SCOPE1
        - $OIDC_SCOPE2
      disable: $OIDC_DISABLE
      key: $OIDC_KEY
      secret: $OIDC_SECRET